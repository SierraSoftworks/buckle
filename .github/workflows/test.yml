name: Test Changes
on: [push]

jobs:
  test-platforms:
    name: ${{ matrix.os }}-${{ matrix.arch }}-test
    runs-on: ${{ matrix.run_on }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: windows
            run_on: windows-latest
            target: x86_64-pc-windows-msvc

          - arch: amd64
            run_on: ubuntu-latest
            os: linux
            target: x86_64-unknown-linux-gnu
            setup: |
              sudo apt-get update
              sudo apt-get install -y libdbus-1-3 libdbus-1-dev
          # Linux arm64 is cross-compiled with `cross`; we build rather than run
          # the tests, since executing them would require qemu emulation.
          - arch: arm64
            run_on: ubuntu-latest
            os: linux
            target: aarch64-unknown-linux-gnu
            cross: true
            skiptests: true

          - arch: amd64
            run_on: macos-latest
            os: darwin
            target: x86_64-apple-darwin
          - arch: arm64
            run_on: macos-latest
            os: darwin
            target: aarch64-apple-darwin
    steps:
      - name: setup dependencies
        run: ${{ matrix.setup }}
        if: matrix.setup

      - uses: actions/checkout@v7.0.1

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview

      - name: install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # Install before the cache is restored so stale ~/.cargo metadata can't
      # report it as already installed and skip it, leaving the binary missing.
      - name: install rustfilt
        if: "!matrix.skiptests"
        run: cargo binstall --no-confirm rustfilt

      - name: install cross
        if: matrix.cross
        run: cargo binstall --no-confirm cross
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: cache ~/.cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install protoc
        if: ${{ !matrix.cross }}
        uses: SierraSoftworks/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo build
        if: matrix.skiptests
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --target ${{ matrix.target }} ${{ matrix.flags }}

      - name: cargo test
        if: "!matrix.skiptests"
        run: ${{ matrix.cross && 'cross' || 'cargo' }} test --no-fail-fast --target ${{ matrix.target }} ${{ matrix.flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C instrument_coverage"
          LLVM_PROFILE_FILE: default.profraw

      - name: Reclaim cache ownership from cross
        if: matrix.cross
        run: sudo chown -R "$(id -u):$(id -g)" "$HOME/.cargo" target

      - name: prepare coverage output
        shell: pwsh
        if: "!matrix.skiptests"
        run: |
          Write-Host "Merging raw profile output files"
          &"$(rustc --print target-libdir)/../bin/llvm-profdata" merge -sparse default.profraw -o default.profdata
          $latest_asset = Get-ChildItem -Path ./target/${{ matrix.target }}/debug/deps -Filter "buckle-*" -File `
          | Where-Object { $_.Name.EndsWith(".exe") -or (-not $_.Name.Contains(".")) } `
          | Sort-Object -Top 1 -Property LastWriteTime
          Write-Host "Latest Asset: $latest_asset"
          Write-Host "Exporting LCOV coverage report"
          &"$(rustc --print target-libdir)/../bin/llvm-cov" export -instr-profile default.profdata $latest_asset `
              -Xdemangler=rustfilt `
              -ignore-filename-regex='.cargo|rustc' `
              -compilation-dir=src `
              -format=lcov > lcov.info

      - name: codecov upload
        uses: codecov/codecov-action@v7
        if: "!matrix.skiptests"
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - run: |
          docker build -t buckle:latest -f build/Dockerfile.linux-x86_64 .
          docker run --rm buckle:latest buckle --version

  test-done:
    name: Tests Complete
    needs: test-platforms
    runs-on: ubuntu-latest
    steps:
      - run: echo "Tests Complete for All Platforms"